apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: source
  namespace: kube-system
spec:
  secretName: tls
  commonName: tls
  issuerRef:
    name: source-ca
    kind: Issuer
    group: cert-manager.io
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "astro,astro-staging"  # Control destination namespaces
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true" # Auto create reflection for matching namespaces
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "astro,astro-staging" # Control auto-reflection namespaces